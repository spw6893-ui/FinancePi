<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef7f3"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#102a43"/>
      <stop offset="100%" stop-color="#1f4e79"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#1f4e79"/>
    </marker>
    <style>
      .title { font: 800 52px Arial, Helvetica, sans-serif; fill: #102a43; }
      .subtitle { font: 500 22px Arial, Helvetica, sans-serif; fill: #486581; }
      .layer-title { font: 800 23px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: .2px; }
      .box-title { font: 800 22px Arial, Helvetica, sans-serif; fill: #102a43; }
      .box-text { font: 600 18px Arial, Helvetica, sans-serif; fill: #334e68; }
      .small { font: 600 15px Arial, Helvetica, sans-serif; fill: #486581; }
      .tag { font: 700 15px Arial, Helvetica, sans-serif; fill: #0f766e; }
      .pill-text { font: 800 16px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .label { font: 700 17px Arial, Helvetica, sans-serif; fill: #1f4e79; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="1380" cy="120" r="170" fill="#d9f99d" opacity="0.25"/>
  <circle cx="150" cy="850" r="210" fill="#99f6e4" opacity="0.28"/>

  <text x="80" y="85" class="title">Finance Agent Architecture</text>
  <text x="84" y="123" class="subtitle">Agentic research loop with finance tools, web search, crypto data, scoped resources, and reproducible artifacts</text>

  <!-- Layer bars -->
  <rect x="70" y="175" width="220" height="90" rx="24" fill="url(#navy)" filter="url(#shadow)"/>
  <text x="98" y="211" class="layer-title">1. User Interface</text>
  <text x="98" y="240" class="small" fill="#dbeafe">Prompt input and CLI session</text>

  <rect x="70" y="340" width="220" height="105" rx="24" fill="url(#teal)" filter="url(#shadow)"/>
  <text x="98" y="376" class="layer-title">2. Agent Brain</text>
  <text x="98" y="405" class="small" fill="#ccfbf1">Planning, tool choice, gaps</text>

  <rect x="70" y="535" width="220" height="115" rx="24" fill="url(#green)" filter="url(#shadow)"/>
  <text x="98" y="571" class="layer-title">3. Tool Layer</text>
  <text x="98" y="600" class="small" fill="#dcfce7">Finance / crypto / web tools</text>

  <rect x="70" y="760" width="220" height="105" rx="24" fill="#334155" filter="url(#shadow)"/>
  <text x="98" y="797" class="layer-title">4. Data &amp; Artifacts</text>
  <text x="98" y="826" class="small" fill="#e2e8f0">Sources and persisted files</text>

  <!-- Layer 1 -->
  <g filter="url(#shadow)">
    <rect x="360" y="170" width="300" height="105" rx="22" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
    <text x="395" y="210" class="box-title">CLI / Interactive Chat</text>
    <text x="395" y="240" class="box-text">User asks market question</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="770" y="170" width="300" height="105" rx="22" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
    <text x="805" y="210" class="box-title">LLM Agent Loop</text>
    <text x="805" y="240" class="box-text">Think → call tools → inspect → answer</text>
  </g>
  <path d="M660 222 L770 222" stroke="#1f4e79" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- Layer 2 -->
  <g filter="url(#shadow)">
    <rect x="335" y="335" width="250" height="120" rx="22" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
    <text x="365" y="375" class="box-title">Finance Prompt</text>
    <text x="365" y="405" class="box-text">No fixed template</text>
    <text x="365" y="432" class="box-text">Facts vs inference</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="635" y="335" width="250" height="120" rx="22" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
    <text x="665" y="375" class="box-title">Tool Selection</text>
    <text x="665" y="405" class="box-text">Quote / news / SEC</text>
    <text x="665" y="432" class="box-text">Crypto / web / resources</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="935" y="335" width="250" height="120" rx="22" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
    <text x="965" y="375" class="box-title">Gap Check</text>
    <text x="965" y="405" class="box-text">Missing data?</text>
    <text x="965" y="432" class="box-text">Need artifact read?</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1235" y="335" width="250" height="120" rx="22" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
    <text x="1265" y="375" class="box-title">Source Attribution</text>
    <text x="1265" y="405" class="box-text">asOf / latestAt</text>
    <text x="1265" y="432" class="box-text">sourceHealth</text>
  </g>

  <!-- Layer 3 tools -->
  <g filter="url(#shadow)">
    <rect x="315" y="520" width="220" height="145" rx="22" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
    <text x="345" y="560" class="box-title">US Equity Tools</text>
    <text x="345" y="590" class="box-text">quote / history</text>
    <text x="345" y="617" class="box-text">news / SEC facts</text>
    <text x="345" y="644" class="box-text">technical snapshot</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="575" y="520" width="220" height="145" rx="22" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
    <text x="605" y="560" class="box-title">Crypto Tools</text>
    <text x="605" y="590" class="box-text">Binance spot</text>
    <text x="605" y="617" class="box-text">klines / funding</text>
    <text x="605" y="644" class="box-text">open interest</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="835" y="520" width="220" height="145" rx="22" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
    <text x="865" y="560" class="box-title">Web Research</text>
    <text x="865" y="590" class="box-text">web_search</text>
    <text x="865" y="617" class="box-text">web_open</text>
    <text x="865" y="644" class="box-text">hosted search</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1095" y="520" width="220" height="145" rx="22" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
    <text x="1125" y="560" class="box-title">Resource Tools</text>
    <text x="1125" y="590" class="box-text">list resources</text>
    <text x="1125" y="617" class="box-text">read artifact</text>
    <text x="1125" y="644" class="box-text">search docs</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1355" y="520" width="170" height="145" rx="22" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
    <text x="1382" y="560" class="box-title">MCP</text>
    <text x="1382" y="590" class="box-text">user</text>
    <text x="1382" y="617" class="box-text">connectors</text>
    <text x="1382" y="644" class="box-text">optional</text>
  </g>

  <!-- Layer 4 data -->
  <g filter="url(#shadow)">
    <rect x="315" y="745" width="220" height="135" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="345" y="784" class="box-title">Yahoo / SEC / News</text>
    <text x="345" y="814" class="box-text">free public data</text>
    <text x="345" y="841" class="box-text">latest available</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="575" y="745" width="220" height="135" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="605" y="784" class="box-title">Binance Data</text>
    <text x="605" y="814" class="box-text">spot and futures</text>
    <text x="605" y="841" class="box-text">BTC / ETH / SOL</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="835" y="745" width="220" height="135" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="865" y="784" class="box-title">Web Sources</text>
    <text x="865" y="814" class="box-text">catalysts</text>
    <text x="865" y="841" class="box-text">verification</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1095" y="745" width="220" height="135" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1125" y="784" class="box-title">CSV / TXT Artifacts</text>
    <text x="1125" y="814" class="box-text">compact summary</text>
    <text x="1125" y="841" class="box-text">artifact path</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1355" y="745" width="170" height="135" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1382" y="784" class="box-title">Project Docs</text>
    <text x="1382" y="814" class="box-text">finance</text>
    <text x="1382" y="841" class="box-text">constraints</text>
  </g>

  <!-- Vertical flow arrows -->
  <path d="M920 275 L920 328" stroke="#1f4e79" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M920 455 L920 513" stroke="#1f4e79" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M920 665 L920 738" stroke="#1f4e79" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- horizontal data arrows -->
  <path d="M425 665 L425 737" stroke="#15803d" stroke-width="3" marker-end="url(#arrow)" opacity="0.85"/>
  <path d="M685 665 L685 737" stroke="#15803d" stroke-width="3" marker-end="url(#arrow)" opacity="0.85"/>
  <path d="M945 665 L945 737" stroke="#15803d" stroke-width="3" marker-end="url(#arrow)" opacity="0.85"/>
  <path d="M1205 665 L1205 737" stroke="#15803d" stroke-width="3" marker-end="url(#arrow)" opacity="0.85"/>
  <path d="M1440 665 L1440 737" stroke="#15803d" stroke-width="3" marker-end="url(#arrow)" opacity="0.85"/>

  <!-- Pills -->
  <rect x="345" y="910" width="210" height="42" rx="21" fill="#0f766e"/>
  <text x="374" y="937" class="pill-text">compact summary</text>
  <rect x="590" y="910" width="175" height="42" rx="21" fill="#1f4e79"/>
  <text x="621" y="937" class="pill-text">artifact path</text>
  <rect x="800" y="910" width="245" height="42" rx="21" fill="#15803d"/>
  <text x="828" y="937" class="pill-text">read / search on demand</text>
  <rect x="1080" y="910" width="255" height="42" rx="21" fill="#334155"/>
  <text x="1110" y="937" class="pill-text">asOf / latestAt / health</text>

  <!-- icons as simple glyphs -->
  <text x="369" y="246" font-size="34">⌘</text>
  <text x="780" y="246" font-size="34">↻</text>
  <text x="317" y="585" font-size="28">📈</text>
  <text x="577" y="585" font-size="28">₿</text>
  <text x="837" y="585" font-size="28">◎</text>
  <text x="1097" y="585" font-size="28">▣</text>
  <text x="1358" y="585" font-size="28">◇</text>
</svg>
